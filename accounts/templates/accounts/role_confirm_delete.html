{% extends 'base.html' %}

{% block title %}Delete Role{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h4>
                </div>
                <div class="card-body">
                    <p class="fs-5">Are you sure you want to delete role:</p>
                    <div class="alert alert-warning">
                        <strong>{{ role.get_name_display }}</strong>
                    </div>
                    <p class="text-danger small">
                        <i class="fas fa-info-circle me-1"></i>
                        This action cannot be undone. Users with this role will be affected.
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'accounts:role_list' %}" class="btn btn-secondary">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash me-2"></i>Yes, Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
